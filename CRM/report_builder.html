<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Builder - Dashboard Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .sortable-ghost { opacity: 0.3; background-color: #ebf4ff; border: 2px dashed #3b82f6; }
        .canvas-grid { min-height: 500px; }
        .inventory-list { max-height: calc(100vh - 350px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
    <div class="flex flex-col h-full">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
            <h1 class="text-xl font-bold text-gray-800"><i class="fas fa-columns mr-2 text-blue-600"></i>Thiết kế Dashboard</h1>
            <div class="flex gap-3">
                <button id="add-global-filter" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm">
                    <i class="fas fa-filter mr-2"></i>Thêm bộ lọc chung
                </button>
                <a href="dashboard.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-all">Hủy</a>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition-all shadow-sm focus:ring-2 focus:ring-blue-400">
                    Lưu Dashboard
                </button>
            </div>
        </header>

        <div id="global-filters-bar" class="bg-white border-b border-gray-100 px-6 py-2 flex items-center gap-4 transition-all" style="display: none;">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Bộ lọc chung:</span>
            <div id="active-filters" class="flex flex-wrap gap-2">
                <!-- Filters added here -->
            </div>
        </div>
        
        <div class="flex-grow flex p-6 gap-6 overflow-hidden">
            <!-- Left: Dashboard Canvas -->
            <main class="flex-grow flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-6 border-b border-gray-100">
                    <input type="text" class="w-full text-2xl font-bold text-gray-800 border-none focus:ring-0 placeholder-gray-300" value="Dashboard mới của tôi" placeholder="Tên dashboard...">
                </div>
                <div class="flex-grow p-6 overflow-y-auto bg-gray-50/50">
                    <div id="canvas-grid" class="canvas-grid grid grid-cols-2 gap-6 p-4 rounded-xl border-2 border-dashed border-gray-200 bg-gray-50">
                        <div class="empty-placeholder col-span-2 flex flex-col items-center justify-center h-full text-gray-400 py-20 pointer-events-none">
                            <i class="fas fa-mouse-pointer text-4xl mb-4 opacity-20"></i>
                            <p class="text-sm">Kéo thả báo cáo từ bên phải vào đây để thiết kế dashboard</p>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Right: Inventory -->
            <aside class="w-80 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                <div class="p-5 border-b border-gray-100 bg-gray-50/30">
                    <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Kho Báo cáo</h2>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" placeholder="Tìm báo cáo..." class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-100 focus:outline-none focus:border-blue-400 transition-all">
                    </div>
                </div>
                
                <div id="available-reports" class="inventory-list flex-grow p-4 space-y-3">
                    <div class="inventory-item group bg-white p-4 border border-gray-100 rounded-xl flex items-center gap-4 cursor-grab hover:border-blue-300 hover:shadow-md transition-all" data-id="1">
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <div class="flex-grow text-sm font-semibold text-gray-700 item-text">Tỷ lệ chuyển đổi</div>
                        <div class="drag-handle text-gray-300 hover:text-gray-500"><i class="fas fa-grip-vertical"></i></div>
                    </div>
                    <div class="inventory-item group bg-white p-4 border border-gray-100 rounded-xl flex items-center gap-4 cursor-grab hover:border-blue-300 hover:shadow-md transition-all" data-id="2">
                        <div class="w-10 h-10 bg-green-50 text-green-600 rounded-lg flex items-center justify-center group-hover:bg-green-600 group-hover:text-white transition-colors">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="flex-grow text-sm font-semibold text-gray-700 item-text">Doanh thu theo ngày</div>
                        <div class="drag-handle text-gray-300 hover:text-gray-500"><i class="fas fa-grip-vertical"></i></div>
                    </div>
                    <!-- Other items omitted for brevity but remain in final -->
                    <div class="inventory-item group bg-white p-4 border border-gray-100 rounded-xl flex items-center gap-4 cursor-grab hover:border-blue-300 hover:shadow-md transition-all" data-id="3">
                        <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center group-hover:bg-purple-600 group-hover:text-white transition-colors">
                            <i class="fas fa-hashtag"></i>
                        </div>
                        <div class="flex-grow text-sm font-semibold text-gray-700 item-text">Tổng số Lead</div>
                        <div class="drag-handle text-gray-300 hover:text-gray-500"><i class="fas fa-grip-vertical"></i></div>
                    </div>
                </div>

                <div class="p-4 bg-gray-50 border-t border-gray-100">
                    <a href="build_report.html" class="flex items-center justify-center w-full py-2 bg-white border border-dashed border-blue-400 text-blue-600 rounded-lg text-sm font-medium hover:bg-blue-50 transition-colors">
                        <i class="fas fa-plus-circle mr-2"></i>Tạo báo cáo mới
                    </a>
                </div>
            </aside>
        </div>
    </div>
    <script src="js/dashboard_designer.js"></script>
</body>
</html>
